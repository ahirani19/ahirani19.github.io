    <script>
      (function () {
        var els = document.querySelectorAll(".js-scramble");
        if (!els.length) return;

        var chars = "abcdefghijklmnopqrstuvwxyz";
        function randomChar() {
          return chars.charAt(Math.floor(Math.random() * chars.length));
        }

        var reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        if (reduced) {
          els.forEach(function (el) {
            el.classList.add("is-ready");
          });
          return;
        }

        els.forEach(function (el) {
          var finalText = el.getAttribute("data-final") || el.textContent;
          el.setAttribute("data-final", finalText);
          var scrambled = "";
          for (var i = 0; i < finalText.length; i++) {
            scrambled += randomChar();
          }
          el.textContent = scrambled;
          el.classList.add("is-ready");
        });

        function animate(el) {
          var finalText = el.getAttribute("data-final");
          var totalDuration = 1400;
          var scrambleInterval = 110;
          var landTimes = [];
          var currentChars = [];
          for (var i = 0; i < finalText.length; i++) {
            landTimes.push(
              Math.random() * totalDuration * 0.55 +
                (i / finalText.length) * totalDuration * 0.45
            );
            currentChars.push(randomChar());
          }

          var start = performance.now();
          var lastReroll = start;
          function frame(now) {
            var elapsed = now - start;
            var shouldReroll = now - lastReroll >= scrambleInterval;
            if (shouldReroll) lastReroll = now;

            var output = "";
            var done = true;
            for (var i = 0; i < finalText.length; i++) {
              if (elapsed >= landTimes[i]) {
                output += finalText.charAt(i);
              } else {
                done = false;
                if (shouldReroll) currentChars[i] = randomChar();
                output += currentChars[i];
              }
            }
            el.textContent = output;
            if (!done) {
              requestAnimationFrame(frame);
            } else {
              el.textContent = finalText;
            }
          }
          requestAnimationFrame(frame);
        }

        setTimeout(function () {
          els.forEach(animate);
        }, 280);
      })();
    </script>
